[package]
name = "rttp"
description = "RTTP: Sub-millisecond Neural Transport Protocol & Stateful Semantic Multicast [RFC-002]"
version.workspace = true
edition = "2024"
authors = ["Aicent Stack Team <lee@aicent.com>"]
license = "Apache-2.0"
repository = "https://github.com/Aicent-Stack/rttp"
homepage = "http://rttp.com"
documentation = "https://github.com/Aicent-Stack/manifesto/blob/main/rfcs/RFC-002-RTTP-NERVES.md"
keywords = ["neural-transport", "low-latency", "rfc-002", "pulse-frame", "multicast", "carrier-grade"]
categories = ["network-programming", "asynchronous", "embedded"]
rust-version = "1.85.0"

[dependencies]
# --- Core Neural Transport Primitives (L0 Backbone) ---
serde = { workspace = true, features = ["derive"] }
anyhow = { workspace = true }
# [PERF] Zero-copy buffer management
bytes = { workspace = true, features = ["serde"] }
# [PERF] Stack-allocated pulse fragments (Note: smallvec does not have a 'std' feature)
smallvec = { workspace = true, features = ["serde"] }

# --- High-Performance Asynchronous Routing ---
tokio = { workspace = true, features = ["net", "rt", "sync"] }
crossbeam = { workspace = true }
crossbeam-channel = { workspace = true }
crossbeam-queue = { workspace = true }
once_cell = { workspace = true }
tracing = { workspace = true }

# --- Optional/Feature-gated Domain Linking ---
rpki = { workspace = true, optional = true, features = ["std"] }
zcmk = { workspace = true, optional = true, features = ["std"] }
embassy-executor = { workspace = true, optional = true }
embassy-time = { workspace = true, optional = true, features = ["std"] }

[features]
default = ["std"]

# [Standard v1.0] Standard library support.
# 🛡️ FIX: Removed 'smallvec/std' because the crate does not possess that feature.
std = [
    "serde/std", 
    "anyhow/std", 
    "tokio/full", 
    "bytes/std", 
    "rpki/std", 
    "zcmk/std", 
    "embassy-time/std"
]

# [RFC-002] Feature flag for bare-metal hardware offloading
embedded = ["embassy-executor", "embassy-time"]
# [RFC-002] Hook for future XDP/DPDK/RDMA acceleration
hardware-accelerated = []

[dev-dependencies]
criterion = { workspace = true, features = ["async_tokio"] }
