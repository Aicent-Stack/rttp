[package]
name = "rttp"
description = "RTTP: Sub-millisecond Neural Transport and Stateful Semantic Multicast Protocol [RFC-002]"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage = "http://rttp.com"
documentation = "https://github.com/Aicent-Stack/manifesto/blob/main/rfcs/RFC-002-RTTP-NERVES.md"
keywords = ["neural-transport", "low-latency", "rfc-002", "pulse-frame", "multicast"]
categories = ["network-programming", "asynchronous", "embedded"]
rust-version = "1.75"

[dependencies]
# --- Reflex Trinity Integration ---
# RTTP explicitly orchestrates Identity (RPKI) and Value (ZCMK) at the wire level.
rpki = { workspace = true }
zcmk = { workspace = true }

# --- High-Performance Neural Primitives ---
# bytes and smallvec are critical for Zero-Copy / Zero-Allocation pulse handling.
serde = { workspace = true, features = ["derive"] }
anyhow = { workspace = true }
bytes = { workspace = true, features = ["serde"] }
smallvec = { workspace = true, features = ["serde"] }
tokio = { workspace = true, features = ["net", "rt", "sync"] }

# --- Nervous System Infrastructure ---
crossbeam = { workspace = true }
crossbeam-channel = { workspace = true }
crossbeam-queue = { workspace = true }
once_cell = { workspace = true }
tracing = { workspace = true } # Telemetry for sub-ms pulse monitoring

[features]
default = ["std"]
std = ["serde/std", "anyhow/std", "rpki/std", "zcmk/std"]
# [RFC-002] Placeholder for bare-metal/embedded hardware drivers
embedded = []
# [RFC-002] Hook for future hardware offloading (DPDK/RDMA/eBPF)
hardware-accelerated = []

[dev-dependencies]
# Benchmarking for <420µs sync targets
criterion = { workspace = true }
